name: native_animated_image_macos
description: macOS implementation of native_animated_image (Rust binary + system ImageIO AVIF bridge).
version: 0.3.2
repository: https://github.com/Lingyan000/native_animated_image

resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      macos:
        # ffiPlugin: Rust dylib for GIF/APNG/WebP via dart:ffi
        ffiPlugin: true
        # Swift plugin class bridges Dart method channel to system ImageIO AVIF
        # decoder (macOS 13.4+ supports animated AVIF, same as Safari)
        pluginClass: NativeAnimatedImageMacosPlugin
